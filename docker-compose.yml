version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: kairox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kairox_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - kairox_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: kairox-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - kairox_redis:/data

volumes:
  kairox_postgres:
  kairox_redis:
